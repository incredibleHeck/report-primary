<style>
  /* ==========================================
   * HECTECH 2.0 PREMIUM OBSIDIAN UI MATRIX
   * GCSidebar Core Stylesheet (Dark Theme)
   * ========================================== */
  :root {
    --primary: #8b5cf6;
    --primary-dark: #6d28d9;
    --primary-light: #c084fc;
    --primary-bg: rgba(139, 92, 246, 0.08);
    --success: #39FF14; /* HecTech Neon Green */
    --success-bg: rgba(57, 255, 20, 0.08);
    --warning: #f59e0b;
    --error: #ff3333;
    --bg: #09090b; /* Deep obsidian background space */
    --surface: #121214; /* Sleek charcoal dark panel */
    --text: #f4f4f5; /* Premium high-contrast silver white */
    --text-secondary: #a1a1aa; /* Steel gray */
    --text-muted: #52525b; /* Shadow zinc */
    --border: #27272a; /* Clean panel divider lines */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #09090b 0%, #121214 100%);
    color: var(--text);
    padding-bottom: 96px; /* Insulates workspace from clipping into the fixed footer */
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- HEADER LAYOUT STRUCTURING --- */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #18181b;
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    flex-shrink: 0;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--success));
  }

  /* --- ACTIVE TARGET STUDENT CONTEXT --- */
  .student-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(24, 24, 27, 0.7);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }

  .student-avatar {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
  }

  .student-details {
    flex: 1;
    min-width: 0;
  }

  .student-label {
    font-size: 8.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 700;
  }

  .student-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* --- FILTER SEARCH INPUT --- */
  .search-wrapper {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 16px;
    pointer-events: none;
  }

  .search-box {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s ease;
    outline: none;
  }

  .search-box:focus {
    border-color: var(--primary-light);
    background: #000000;
    box-shadow: 0 0 0 2px var(--primary-bg);
  }

  /* --- SCROLLABLE ACCORDION FRAME --- */
  .accordion-scroll-frame {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 24px;
  }

  .accordion-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .accordion-item:hover {
    border-color: #3f3f46;
    background: #161619;
  }

  .accordion-header {
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    user-select: none;
    transition: background 0.15s ease;
  }

  .accordion-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .accordion-header-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .category-icon {
    font-size: 16px;
    flex-shrink: 0;
    color: var(--text-secondary);
  }

  .category-badge {
    background: var(--primary);
    color: #ffffff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 999px;
    min-width: 16px;
    height: 16px;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
  }

  .category-badge.active {
    display: inline-flex;
  }

  .accordion-header:hover {
    background: #1c1c1f;
  }

  .accordion-header.active {
    background: var(--primary-bg);
    color: #ffffff;
    border-bottom: 1px solid var(--border);
  }

  .accordion-header .arrow {
    font-size: 16px;
    color: var(--text-muted);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    flex-shrink: 0;
  }

  .accordion-header.active .arrow {
    transform: rotate(180deg);
    color: var(--primary-light);
  }

  .accordion-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: #161619;
  }

  /* --- CATEGORY INTERACTION CONTROLS --- */
  .category-toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 10px 14px 4px;
    background: transparent;
  }

  .toolbar-btn {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s ease;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .toolbar-btn:hover {
    color: var(--primary-light);
  }

  .toolbar-btn .material-icons-round {
    font-size: 12px;
  }

  /* --- MATRIX TRAIT CHECKBOX GRID --- */
  .checkbox-grid {
    padding: 6px 12px 14px;
    display: flex;
    flex-direction: column; /* 🟢 FIXED: Converted to flex-stack to stop text squishing in a 300px sidebar */
    gap: 6px;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    font-size: 12.5px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    transition: all 0.15s ease;
    user-select: none;
  }

  .checkbox-item:hover {
    background: #1c1c1f;
    border-color: #3f3f46;
  }

  .checkbox-item:has(input:checked) {
    background: var(--primary-bg);
    border-color: rgba(139, 92, 246, 0.4);
  }

  .checkbox-item input {
    width: 16px;
    height: 16px;
    margin-right: 10px;
    accent-color: var(--primary-light);
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-item span {
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .checkbox-item:has(input:checked) span {
    color: #ffffff;
    font-weight: 600;
  }

  /* --- HIGHLIGHT SEARCH RESULTS --- */
  mark {
    background: rgba(234, 179, 8, 0.25);
    color: #fef08a;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
  }

  /* --- FOOTER SELECTION PANEL --- */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #18181b;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
    z-index: 100;
  }

  .selection-meta-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }

  .selection-count {
    font-size: 11.5px;
    color: var(--text-secondary);
    letter-spacing: 0.2px;
  }

  .selection-count strong {
    color: var(--primary-light);
    font-weight: 700;
  }

  /* --- SYSTEM PRIMARY ACTIONS --- */
  .btn-primary {
    width: 100%;
    padding: 12px 20px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #ffffff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
    overflow: hidden;
  }

  .btn-primary:hover:not(:disabled) {
    filter: brightness(1.1);
  }

  .btn-primary:disabled {
    background: #27272a !important;
    color: var(--text-muted) !important;
    box-shadow: none !important;
    cursor: not-allowed;
  }

  /* 🟢 FIXED: Absolute centered loading spinner stops text labels from distorting */
  .spinner-visible {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
    right: 16px;
    top: calc(50% - 8px);
    display: block;
  }

  .spinner-hidden {
    display: none;
  }

  /* --- EMPTY SEARCH STATES --- */
  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-secondary);
  }

  .empty-state-text {
    font-size: 12px;
    margin-top: 6px;
  }

  .empty-state-icon {
    font-size: 36px;
    margin-bottom: 8px;
  }

  /* --- TOAST INTERFACE LINES --- */
  .toast-message {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1f1f23;
    color: #ffffff;
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 2000;
    pointer-events: none;
    border: 1px solid var(--border);
  }

  .toast-message.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast-message.warning {
    background: #7a2a1d;
    border-color: var(--error);
    color: #fca5a5;
  }

  .toast-message.error {
    background: #7a2a1d;
    border-color: var(--error);
    color: #fca5a5;
  }

  /* --- STRUCTURAL ALIGNMENT SHORTCUTS --- */
  .layout-stack-vertical { display: flex; flex-direction: column; }
  .layout-flex-horizontal { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .layout-center-contents { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .animated-pulse { animation: pulse 2s infinite ease-in-out; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.08); opacity: 0.8; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .accordion-item { animation: fadeIn 0.2s ease forwards; }
</style>
