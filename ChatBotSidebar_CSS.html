<style>
    /* ==========================================
     * HECTECH 2.0 PREMIUM OBSIDIAN UI MATRIX
     * ChatBotSidebar Core Stylesheet (Dark Theme)
     * ========================================== */
    :root {
      --primary: #8b5cf6;
      --primary-dark: #6d28d9;
      --primary-light: #c084fc;
      --primary-bg: rgba(139, 92, 246, 0.08);
      --success: #39FF14; /* HecTech Neon Green */
      --success-bg: rgba(57, 255, 20, 0.08);
      --warning: #f59e0b;
      --error: #ff3333;
      --bg: #09090b; /* Pure space velvet */
      --surface: #121214; /* Sleek charcoal dark panel */
      --text: #f4f4f5; /* High-readability silver white */
      --text-secondary: #a1a1aa; /* Soft muted steel */
      --text-muted: #52525b; /* Shadow gray */
      --border: #27272a; /* Clean edge border line */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #09090b 0%, #121214 100%);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- HEADER STRUCTURE --- */
    .header {
      background: #18181b;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
      position: relative;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--success));
    }

    .header-title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.3px;
    }

    .header-title .material-icons-round {
      color: var(--primary-light);
      font-size: 18px;
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 50%;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .refresh-btn:hover {
      background: var(--primary-bg);
      color: var(--success);
    }

    /* --- ACTIVE ROSTER TARGET METADATA --- */
    .student-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(24, 24, 27, 0.7);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .student-avatar {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
    }

    .student-details {
      flex: 1;
      min-width: 0;
    }

    .student-label {
      font-size: 8.5px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 700;
    }

    .student-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--primary-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* --- CHAT TIMELINE STREAM --- */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: transparent;
    }

    .message {
      max-width: 88%;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .message.user {
      align-self: flex-end;
    }

    .message.bot {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      position: relative;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      border-radius: var(--radius);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
    }

    .message.bot .bubble {
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    /* --- TRANSACTING WORKSPACE BUTTONS --- */
    .bot-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #27272a;
      flex-wrap: wrap;
    }

    .action-btn {
      background: #1c1c1f;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s ease;
    }

    .action-btn:hover {
      background: var(--primary-bg);
      border-color: var(--primary-light);
      color: #ffffff;
    }

    .action-btn.success {
      background: var(--success-bg);
      border-color: rgba(57, 255, 20, 0.3);
      color: var(--success);
    }

    .action-btn .material-icons-round {
      font-size: 13px;
    }

    /* --- TYPING ANIMATION DOTS --- */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      background-color: var(--text-secondary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }

    /* --- QUICK ACTION INTERFACE CHIPS --- */
    .chips-outer {
      overflow-x: auto;
      white-space: nowrap;
      padding: 10px 12px;
      background: rgba(18, 18, 20, 0.8);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chips-outer::-webkit-scrollbar {
      height: 3px;
    }
    
    .chips-outer::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 4px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      margin-right: 6px;
      transition: all 0.2s ease;
    }

    .chip:hover {
      border-color: var(--primary-light);
      background: var(--primary-bg);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .chip .material-icons-round {
      font-size: 12px;
    }

    /* --- DOCK FOOTER LAYOUT --- */
    .input-footer {
      background: #18181b;
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .layout-stack-vertical {
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
    }

    .layout-flex-horizontal {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-box-wrapper {
      flex: 1;
      position: relative;
    }

    .chat-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 36px 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      max-height: 90px;
      min-height: 38px;
      background: var(--bg);
      color: var(--text);
      transition: all 0.15s ease;
      outline: none;
      line-height: 1.4;
    }

    .chat-input:focus {
      border-color: var(--primary-light);
      background: #000000;
      box-shadow: 0 0 0 2px var(--primary-bg);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .clear-input-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: none;
      padding: 2px;
      border-radius: 50%;
    }

    .clear-input-btn:hover {
      color: #ffffff;
      background: var(--border);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .send-btn:disabled {
      background: #27272a;
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* --- WELCOME CONTEXT CARD --- */
    .welcome-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      animation: fadeIn 0.3s ease forwards;
    }

    .welcome-icon {
      width: 44px;
      height: 44px;
      background: var(--primary-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-light);
      margin: 0 auto 12px;
    }

    .welcome-icon .material-icons-round {
      font-size: 24px;
    }

    .welcome-title {
      font-size: 13.5px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .welcome-body {
      font-size: 11.5px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* --- TOAST OVERLAY INTERFACES --- */
    .toast-overlay {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #1f1f23;
      color: #ffffff;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 11.5px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
    }

    .toast-overlay.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-overlay.warning {
      background: #7a2a1d;
      border-color: var(--error);
      color: #fca5a5;
    }

    .toast-overlay.success {
      background: #062f19;
      border-color: rgba(57, 255, 20, 0.4);
      color: #a7f3d0;
    }

    /* --- TOGGLE CONTROL GRID SLIDERS --- */
    .settings-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
    }

    .toggle-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #18181b;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .toggle-container:hover {
      border-color: var(--primary-light);
      background: var(--primary-bg);
    }

    .toggle-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toggle-label .material-icons-round {
      font-size: 14px;
      color: var(--primary-light);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 28px;
      height: 16px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border);
      transition: .25s;
      border-radius: 16px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 10px;
      width: 10px;
      left: 3px;
      bottom: 3px;
      background-color: #ffffff;
      transition: .25s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--primary);
    }

    input:checked + .slider:before {
      transform: translateX(12px);
    }

    /* --- INPUT META DATA LAYERS --- */
    .input-meta-info {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 4px 4px;
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
</style>
