<style>
  /* =========================================================================
   * HECTECH 2.0 PREMIUM OBSIDIAN UI MATRIX
   * Sidebar Master Engine Dashboard Stylesheet (Dark Theme)
   * ========================================================================= */
  :root {
    --primary: #8b5cf6;
    --primary-dark: #6d28d9;
    --primary-light: #c084fc;
    --primary-bg: rgba(139, 92, 246, 0.08);
    --success: #39FF14; /* HecTech Neon Green */
    --success-bg: rgba(57, 255, 20, 0.08);
    --success-light: rgba(57, 255, 20, 0.15);
    --warning: #f59e0b;
    --error: #ff3333;
    --error-light: rgba(255, 51, 51, 0.15);
    --bg: #09090b; /* Pure space velvet */
    --surface: #121214; /* Sleek charcoal dark panel canvas */
    --text: #f4f4f5; /* High-readability silver white */
    --text-secondary: #a1a1aa; /* Steel gray */
    --text-muted: #52525b; /* Shadow zinc */
    --border: #27272a; /* Clean panel divider lines */
    --terminal-bg: #050507; /* Darker carbon terminal bed */
    --terminal-text: #e2e8f0;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* 1. 🟢 FIXED: Converted body into a locked viewport flex-column container
        This completely eliminates double scrollbars across all screen scales */
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #09090b 0%, #121214 100%);
    height: 100vh;
    padding: 14px;
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- DATA CARD ELEMENT CONTAINER --- */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    flex-shrink: 0; /* Safeguards data layouts from flattening when logs populate */
    transition: border-color 0.15s ease;
  }
  
  .card:hover {
    border-color: #3f3f46;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--success));
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .icon-wrapper {
    width: 38px;
    height: 38px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    box-shadow: 0 2px 8px rgba(139, 92, 246, 0.25);
    flex-shrink: 0;
  }

  .icon-wrapper .material-icons-round {
    font-size: 20px;
  }

  h2 {
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
    line-height: 1.3;
  }

  /* --- TIMELINE PROGRESS ENGINE --- */
  .progress-section {
    margin-top: 14px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .progress-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .progress-value {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary-light);
  }

  .progress-track {
    width: 100%;
    background: var(--border);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 999px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .progress-fill::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .progress-fill.success { background: linear-gradient(90deg, var(--success), #22c55e); }
  .progress-fill.error { background: linear-gradient(90deg, var(--error), #dc2626); }

  /* --- ANALYTICS LEDGER GRID --- */
  .stats-row {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }

  /* 2. 🟢 FIXED: Tuned padding variables and forced font scaling mechanics
        Guarantees triple-digit counts will fit perfectly in a 300px sidebar width */
  .stat-badge {
    flex: 1;
    background: #18181b;
    border-radius: var(--radius-sm);
    padding: 8px 4px;
    text-align: center;
    border: 1px solid var(--border);
    min-width: 0; /* Permits sub-components to shrink natively without overflows */
  }

  .stat-badge .value {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stat-badge .label {
    font-size: 8px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* --- ACTIONS COMMAND TERMINAL --- */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 10px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 12px;
  }

  .btn-danger {
    background: linear-gradient(135deg, var(--error), #b91c1c);
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(255, 51, 51, 0.15);
  }

  .btn-danger:hover { filter: brightness(1.1); }
  .btn-danger:disabled {
    background: #27272a !important;
    color: var(--text-muted) !important;
    box-shadow: none !important;
    cursor: not-allowed;
    transform: none;
  }

  .btn-danger .material-icons-round {
    font-size: 16px;
  }

  /* --- SYSTEM OUTPUT LOGGER PANEL --- */
  /* 3. 🟢 FIXED: Terminal layout fills all remaining layout window frames dynamically */
  .terminal-card {
    background: var(--terminal-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex: 1; /* Captures remaining vertical window space gracefully */
    min-height: 120px;
  }

  .terminal-header {
    background: rgba(255, 255, 255, 0.02);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .terminal-dots { display: flex; gap: 5px; }
  .terminal-dot { width: 8px; height: 8px; border-radius: 50%; }
  .terminal-dot.red { background: #ff3333; }
  .terminal-dot.yellow { background: #f59e0b; }
  .terminal-dot.green { background: #39FF14; }

  .terminal-title {
    flex: 1;
    text-align: center;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  #log {
    font-family: "Consolas", "Courier New", monospace;
    font-size: 11px;
    line-height: 1.5;
    overflow-y: auto;
    padding: 12px;
    color: var(--terminal-text);
    flex: 1; /* Maps scroll frame down onto the interior core base */
  }

  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }

  /* 4. 🟢 FIXED: Dropped resource-intensive fade-in logic to allow stable rapid updates */
  .log-entry {
    padding: 3px 6px;
    margin-bottom: 4px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.01);
    border-left: 3px solid transparent;
    word-break: break-word; /* Prevents long file string exceptions from breaking layouts */
  }

  .log-entry .timestamp {
    color: var(--text-muted);
    margin-right: 6px;
    font-size: 10px;
  }

  .log-info { border-left-color: var(--primary-light); color: #c084fc; }
  .log-success { border-left-color: var(--success); color: #86efac; }
  .log-error { border-left-color: var(--error); color: #fca5a5; }

  /* --- STATE INTERFACE BADGES --- */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
    align-self: flex-start;
  }

  .status-badge.running { background: rgba(139, 92, 246, 0.12); color: var(--primary-light); }
  .status-badge.complete { background: var(--success-bg); color: var(--success); }
  .status-badge.error { background: rgba(255, 51, 51, 0.08); color: var(--error); }

  .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.5s infinite ease-in-out;
  }

  .hidden { display: none !important; }
  .rotate-animation { animation: spin 1.2s linear infinite; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
</style>
