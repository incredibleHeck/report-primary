<!doctype html>
<html>
  <head>
    <base target="_top" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --primary-light: #a5b4fc;
        --success: #10b981;
        --success-light: #d1fae5;
        --error: #ef4444;
        --error-light: #fee2e2;
        --warning: #f59e0b;
        --bg: #f8fafc;
        --surface: rgba(255, 255, 255, 0.9);
        --text: #1e293b;
        --text-secondary: #64748b;
        --text-muted: #94a3b8;
        --border: #e2e8f0;
        --terminal-bg: #0f172a;
        --terminal-text: #e2e8f0;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 10px 15px -3px rgba(99, 102, 241, 0.1), 0 4px 6px -4px rgba(99, 102, 241, 0.05);
        --radius: 14px;
        --radius-sm: 10px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        min-height: 100vh;
        padding: 16px;
        color: var(--text);
      }

      .card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(8px);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      
      .card:hover {
        box-shadow: var(--shadow-lg);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--primary-light));
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .icon-wrapper {
        width: 44px;
        height: 44px;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 4px 10px rgba(99, 102, 241, 0.25);
      }

      .icon-wrapper .material-icons-round {
        font-size: 24px;
      }

      h2 {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }

      .subtitle {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 2px;
        line-height: 1.4;
      }

      .progress-section {
        margin-top: 20px;
      }

      .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .progress-label {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .progress-value {
        font-size: 13px;
        font-weight: 700;
        color: var(--primary);
      }

      .progress-track {
        width: 100%;
        background: var(--border);
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
        position: relative;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--primary), var(--primary-light));
        border-radius: 999px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }

      .progress-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        animation: shimmer 2s infinite;
      }

      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      .progress-fill.success {
        background: linear-gradient(90deg, var(--success), #34d399);
      }

      .progress-fill.error {
        background: linear-gradient(90deg, var(--error), #f87171);
      }

      .stats-row {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      .stat-badge {
        flex: 1;
        background: var(--bg);
        border-radius: var(--radius-sm);
        padding: 10px;
        text-align: center;
        border: 1px solid var(--border);
      }

      .stat-badge .value {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
      }

      .stat-badge .label {
        font-size: 9px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 14px 20px;
        border: none;
        border-radius: var(--radius-sm);
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 16px;
      }

      .btn-danger {
        background: linear-gradient(135deg, var(--error), #dc2626);
        color: white;
        box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.35);
      }

      .btn-danger:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px 0 rgba(239, 68, 68, 0.45);
      }

      .btn-danger:active {
        transform: translateY(0);
      }

      .btn-danger:disabled {
        background: var(--text-muted);
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
      }

      .btn-danger .material-icons-round {
        font-size: 18px;
      }

      .terminal-card {
        background: var(--terminal-bg);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .terminal-header {
        background: rgba(255, 255, 255, 0.05);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .terminal-dots {
        display: flex;
        gap: 6px;
      }

      .terminal-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .terminal-dot.red { background: #ef4444; }
      .terminal-dot.yellow { background: #f59e0b; }
      .terminal-dot.green { background: #10b981; }

      .terminal-title {
        flex: 1;
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      #log {
        font-family: "Consolas", "Courier New", monospace;
        font-size: 11px;
        line-height: 1.6;
        height: 200px;
        overflow-y: auto;
        padding: 16px;
        color: var(--terminal-text);
      }

      #log::-webkit-scrollbar {
        width: 6px;
      }

      #log::-webkit-scrollbar-track {
        background: transparent;
      }

      #log::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }

      .log-entry {
        padding: 4px 8px;
        margin-bottom: 4px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.02);
        border-left: 3px solid transparent;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-4px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .log-entry .timestamp {
        color: var(--text-muted);
        margin-right: 8px;
      }

      .log-info {
        border-left-color: var(--primary-light);
        color: #93c5fd;
      }
      .log-success {
        border-left-color: var(--success);
        color: #6ee7b7;
      }
      .log-error {
        border-left-color: var(--error);
        color: #fca5a5;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 12px;
      }

      .status-badge.running {
        background: rgba(99, 102, 241, 0.1);
        color: var(--primary);
      }

      .status-badge.complete {
        background: var(--success-light);
        color: var(--success);
      }

      .status-badge.error {
        background: var(--error-light);
        color: var(--error);
      }

      .pulse-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.85); }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <div class="icon-wrapper" id="status-icon">
          <span class="material-icons-round">sync</span>
        </div>
        <div>
          <h2 id="sidebar-title">Initializing...</h2>
          <p class="subtitle" id="sidebar-desc">
            Connecting to HecTech AI Engine
          </p>
        </div>
      </div>

      <div class="status-badge running" id="status-badge">
        <span class="pulse-dot"></span>
        <span id="status-label">Connecting</span>
      </div>

      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">Progress</span>
          <span class="progress-value" id="progress-percent">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-bar"></div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-badge">
          <div class="value" id="completed-count">0</div>
          <div class="label">Completed</div>
        </div>
        <div class="stat-badge">
          <div class="value" id="total-count">0</div>
          <div class="label">Total</div>
        </div>
        <div class="stat-badge">
          <div class="value" id="batch-size">-</div>
          <div class="label">Batch</div>
        </div>
      </div>

      <button class="btn btn-danger hidden" id="cancel-btn">
        <span class="material-icons-round">stop_circle</span>
        <span>Stop Process</span>
      </button>
    </div>

    <div class="terminal-card">
      <div class="terminal-header">
        <div class="terminal-dots">
          <span class="terminal-dot red"></span>
          <span class="terminal-dot yellow"></span>
          <span class="terminal-dot green"></span>
        </div>
        <span class="terminal-title">Process Log</span>
      </div>
      <div id="log"></div>
    </div>

    <script>
      const MAX_CONCURRENT_REQUESTS = 5;
      const MAX_RETRIES = 3;

      let totalRows = 0;
      let rowsCompleted = 0;
      let chunkSize = 10;
      let currentAction = "";
      let isCancelled = false;
      let chunkQueue = [];
      let activeRequests = 0;

      function log(message, type = "info") {
        const logDiv = document.getElementById("log");
        const entry = document.createElement("div");

        let colorClass = "log-info";
        if (type === "error") colorClass = "log-error";
        if (type === "success") colorClass = "log-success";

        const time = new Date().toLocaleTimeString([], { hour12: false });
        entry.className = `log-entry ${colorClass}`;
        entry.innerHTML = `<span class="timestamp">${time}</span>${message}`;

        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      function updateProgress() {
        const percent =
          totalRows > 0
            ? Math.min(100, Math.round((rowsCompleted / totalRows) * 100))
            : 0;

        document.getElementById("progress-bar").style.width = percent + "%";
        document.getElementById("progress-percent").textContent = percent + "%";
        document.getElementById("completed-count").textContent = rowsCompleted;
        document.getElementById("total-count").textContent = totalRows;

        if (percent === 100) {
          document.getElementById("progress-bar").classList.add("success");
          setStatus("complete", "Complete");
        }
      }

      function setStatus(type, label) {
        const badge = document.getElementById("status-badge");
        const iconWrapper = document.getElementById("status-icon");
        const icon = iconWrapper.querySelector(".material-icons-round");

        badge.className = "status-badge " + type;
        document.getElementById("status-label").textContent = label;

        if (type === "complete") {
          icon.textContent = "check_circle";
          iconWrapper.style.background =
            "linear-gradient(135deg, #10b981, #34d399)";
        } else if (type === "error") {
          icon.textContent = "error";
          iconWrapper.style.background =
            "linear-gradient(135deg, #ef4444, #f87171)";
        } else {
          icon.textContent = "sync";
        }
      }

      window.onload = function () {
        log("Establishing connection...", "info");
        google.script.run
          .withSuccessHandler(initQueue)
          .withFailureHandler((err) => {
            log("Connection failed: " + err, "error");
            setStatus("error", "Failed");
            document.getElementById("sidebar-title").innerText =
              "Connection Error";
          })
          .getSelectionInfo();
      };

      function initQueue(info) {
        if (info.error) {
          log(info.error, "error");
          setStatus("error", "Error");
          return;
        }

        totalRows = info.numRows;
        chunkSize = info.chunkSize || 10;
        currentAction = info.action;

        document.getElementById("sidebar-title").textContent = info.title;
        document.getElementById("sidebar-desc").textContent =
          `Processing ${totalRows} items in smart batches`;
        document.getElementById("batch-size").textContent = chunkSize;
        document.getElementById("total-count").textContent = totalRows;
        document.getElementById("cancel-btn").classList.remove("hidden");

        setStatus("running", "Processing");

        for (let i = 0; i < totalRows; i += chunkSize) {
          let size = Math.min(chunkSize, totalRows - i);
          chunkQueue.push({ startRowIndex: i, count: size, retries: 0 });
        }

        log(`Queue initialized: ${chunkQueue.length} batches`, "info");
        processQueue();
      }

      function processQueue() {
        if (isCancelled) return;

        while (
          activeRequests < MAX_CONCURRENT_REQUESTS &&
          chunkQueue.length > 0
        ) {
          const chunk = chunkQueue.shift();
          activeRequests++;
          sendChunk(chunk);
        }

        if (activeRequests === 0 && chunkQueue.length === 0) {
          log("All tasks completed successfully!", "success");
          document.getElementById("sidebar-title").textContent = "Complete";
          document.getElementById("sidebar-desc").textContent =
            "All items have been processed";
          document.getElementById("cancel-btn").classList.add("hidden");
          setStatus("complete", "Done");
          google.script.run.toast(
            "HecTech: Batch process complete!",
            "Success"
          );
          setTimeout(() => {
            google.script.host.close();
          }, 1500);
        }
      }

      function sendChunk(chunk) {
        const batchNum = Math.floor(chunk.startRowIndex / chunkSize) + 1;
        log(`Batch ${batchNum} started (${chunk.count} items)`, "info");

        google.script.run
          .withSuccessHandler(() => {
            rowsCompleted += chunk.count;
            activeRequests--;
            updateProgress();
            log(`Batch ${batchNum} completed`, "success");
            processQueue();
          })
          .withFailureHandler((err) => {
            activeRequests--;
            log(`Batch ${batchNum} failed: ${err.message}`, "error");

            if (chunk.retries < MAX_RETRIES) {
              chunk.retries++;
              log(
                `Retrying batch ${batchNum} (attempt ${chunk.retries + 1})`,
                "info",
              );
              chunkQueue.push(chunk);
            } else {
              log(`Batch ${batchNum} permanently failed`, "error");
            }
            processQueue();
          })
          .processChunk(currentAction, chunk.startRowIndex, chunk.count);
      }

      document.getElementById("cancel-btn").onclick = function () {
        isCancelled = true;
        this.disabled = true;
        this.innerHTML =
          '<span class="material-icons-round">hourglass_empty</span><span>Stopping...</span>';
        log("Process cancelled by user", "error");
        document.getElementById("progress-bar").classList.add("error");
        setStatus("error", "Cancelled");
      };
    </script>
  </body>
</html>
