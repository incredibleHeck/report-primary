<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
      /* --- THEME CONFIGURATION --- */
      :root {
        --primary: #1a73e8;       /* Royal Blue */
        --primary-dark: #1557b0;
        --success: #1e8e3e;       /* Green */
        --error: #d93025;         /* Red */
        --bg: #f8f9fa;            /* Light Grey Background */
        --surface: #ffffff;       /* White Cards */
        --text: #202124;
        --text-secondary: #5f6368;
        --border: #dadce0;
        --terminal-bg: #2d2d2d;   /* Dark log background */
        --terminal-text: #e0e0e0;
      }

      body {
        font-family: 'Roboto', sans-serif;
        background-color: var(--bg);
        margin: 0;
        padding: 16px;
        color: var(--text);
        box-sizing: border-box;
      }

      /* --- CARD STYLING --- */
      .card {
        background: var(--surface);
        border-radius: 8px;
        box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        padding: 20px;
        margin-bottom: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      h2 {
        font-size: 18px;
        font-weight: 500;
        margin: 0 0 8px 0;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .subtitle {
        font-size: 13px;
        color: var(--text-secondary);
        margin: 0 0 20px 0;
      }

      /* --- PROGRESS BAR --- */
      .progress-wrapper {
        width: 100%;
        margin-bottom: 12px;
      }

      .progress-bg {
        width: 100%;
        background-color: #e0e0e0;
        border-radius: 4px;
        height: 8px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background-color: var(--primary);
        border-radius: 4px;
        transition: width 0.3s ease;
      }

      .progress-text {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-secondary);
        margin-top: 6px;
        display: flex;
        justify-content: space-between;
      }

      /* --- LOG TERMINAL --- */
      .terminal-card {
        background: var(--surface);
        border-radius: 8px;
        border: 1px solid var(--border);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .terminal-header {
        background: #f1f3f4;
        padding: 8px 12px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-secondary);
        border-bottom: 1px solid var(--border);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #log {
        background-color: var(--terminal-bg);
        color: var(--terminal-text);
        font-family: 'Roboto Mono', monospace;
        font-size: 11px;
        height: 180px;
        overflow-y: auto;
        padding: 10px;
        text-align: left;
      }

      .log-entry { margin-bottom: 4px; line-height: 1.4; border-bottom: 1px solid #444; padding-bottom: 2px; }
      .log-error { color: #ff6b6b; }
      .log-success { color: #69f0ae; }
      .log-info { color: #80d8ff; }

      /* --- BUTTONS --- */
      button {
        background-color: var(--error);
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
        transition: background 0.2s;
        display: none; /* Hidden until running */
      }

      button:hover { background-color: #b71c1c; }
      button:disabled { background-color: var(--text-secondary); cursor: not-allowed; }

    </style>
  </head>
  <body>

    <div class="card">
      <h2 id="sidebar-title">
        <span class="material-icons">memory</span> Initializing...
      </h2>
      <p class="subtitle" id="sidebar-desc">Connecting to HeckTeck AI...</p>
      
      <div class="progress-wrapper">
        <div class="progress-bg">
          <div class="progress-fill" id="progress-bar"></div>
        </div>
        <div class="progress-text">
          <span id="status-text">0%</span>
          <span id="fraction-text">0/0</span>
        </div>
      </div>
      
      <button id="cancel-btn">
        <span class="material-icons" style="font-size:16px; vertical-align:text-bottom;">stop</span> STOP PROCESS
      </button>
    </div>

    <div class="terminal-card">
      <div class="terminal-header">
        <span class="material-icons" style="font-size:14px;">terminal</span> Process Log
      </div>
      <div id="log"></div>
    </div>

    <script>
      // --- CONFIGURATION ---
      // ⚠️ Use 1 for standard Google accounts to avoid write-conflicts. 
      // Use 2 or 3 only for Generation tasks (API calls).
      const MAX_CONCURRENT_REQUESTS = 2; 
      const MAX_RETRIES = 3;

      // --- STATE ---
      let totalRows = 0;
      let rowsCompleted = 0;
      let chunkSize = 10;
      let currentAction = "";
      let isCancelled = false;
      
      let chunkQueue = [];      
      let activeRequests = 0;   
      
      // --- LOGGING ---
      function log(message, type = "info") {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        
        let colorClass = "log-info";
        if (type === "error") colorClass = "log-error";
        if (type === "success") colorClass = "log-success";
        
        entry.className = `log-entry ${colorClass}`;
        const time = new Date().toLocaleTimeString([], { hour12: false });
        entry.textContent = `[${time}] ${message}`;
        
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      // --- UI UPDATES ---
      function updateProgress() {
        const percent = totalRows > 0 ? Math.min(100, Math.round((rowsCompleted / totalRows) * 100)) : 0;
        
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('status-text').textContent = percent + '% Completed';
        document.getElementById('fraction-text').textContent = `${rowsCompleted}/${totalRows}`;
        
        if (percent === 100) {
            document.getElementById('progress-bar').style.backgroundColor = "var(--success)";
        }
      }

      // --- STARTUP ---
      window.onload = function() {
        log("Connecting to spreadsheet...", "info");
        google.script.run
          .withSuccessHandler(initQueue)
          .withFailureHandler(err => {
             log("Initialization Failed: " + err, "error");
             document.getElementById('sidebar-title').innerText = "Connection Error";
             document.getElementById('sidebar-title').style.color = "var(--error)";
          })
          .getSelectionInfo(); 
      };

      // --- QUEUE BUILDER ---
      function initQueue(info) {
        if (info.error) {
          log(info.error, "error");
          return;
        }

        totalRows = info.numRows;
        chunkSize = info.chunkSize || 10;
        currentAction = info.action;
        
        // Update UI Text
        document.getElementById('sidebar-title').innerHTML = `<span class="material-icons">autorenew</span> ${info.title}`;
        document.getElementById('sidebar-desc').textContent = `Processing ${totalRows} students in batches of ${chunkSize}.`;
        document.getElementById('cancel-btn').style.display = 'inline-block';

        // Build Batches
        for (let i = 0; i < totalRows; i += chunkSize) {
          let size = Math.min(chunkSize, totalRows - i);
          chunkQueue.push({
            startRowIndex: i, 
            count: size,
            retries: 0
          });
        }
        
        log(`Queue ready: ${chunkQueue.length} batches created.`, "info");
        processQueue(); // 🚀 IGNITION
      }

      // --- WORKER ENGINE ---
      function processQueue() {
        if (isCancelled) return;

        // Launch workers if slots available
        while (activeRequests < MAX_CONCURRENT_REQUESTS && chunkQueue.length > 0) {
          const chunk = chunkQueue.shift(); 
          activeRequests++;
          sendChunk(chunk);
        }

        // Check Completion
        if (activeRequests === 0 && chunkQueue.length === 0) {
          log("✅ All tasks completed successfully.", "success");
          document.getElementById('sidebar-title').innerHTML = `<span class="material-icons">check_circle</span> Complete`;
          document.getElementById('sidebar-title').style.color = "var(--success)";
          document.getElementById('cancel-btn').style.display = 'none';
          document.getElementById('sidebar-desc').textContent = "You can close this sidebar.";
          
          // Confetti sound or toast
          google.script.run.toast("HeckTeck: Batch Process Complete!", "Success");
        }
      }

      // --- API CALLER ---
      function sendChunk(chunk) {
        const batchNum = Math.floor(chunk.startRowIndex / chunkSize) + 1;
        log(`➤ Sending Batch ${batchNum} (${chunk.count} items)...`, "info");

        google.script.run
          .withSuccessHandler(() => {
            rowsCompleted += chunk.count;
            activeRequests--;
            updateProgress();
            log(`✔ Batch ${batchNum} finished.`, "success");
            processQueue(); 
          })
          .withFailureHandler((err) => {
            activeRequests--;
            log(`✘ Batch ${batchNum} Error: ${err.message}`, "error");
            
            if (chunk.retries < MAX_RETRIES) {
              chunk.retries++;
              log(`↺ Retrying Batch ${batchNum} (Attempt ${chunk.retries})...`, "info");
              chunkQueue.push(chunk); 
            } else {
              log(`☠ Batch ${batchNum} Failed permanently.`, "error");
            }
            processQueue(); 
          })
          .processChunk(currentAction, chunk.startRowIndex, chunk.count);
      }

      // --- STOP BUTTON ---
      document.getElementById('cancel-btn').onclick = function() {
        isCancelled = true;
        this.disabled = true;
        this.innerHTML = "Stopping...";
        log("🛑 Process stopped by user.", "error");
        document.getElementById('progress-bar').style.backgroundColor = "var(--error)";
      };

    </script>
  </body>
</html>
